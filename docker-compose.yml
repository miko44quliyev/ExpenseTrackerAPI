services:
  db:
    image: mysql:8.0
    container_name: devops-db
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - devops-db-data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - devops-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build: .
    container_name: devops_app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: ${DB_URL}?useSSL=false&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy
    networks:
      - devops-network

networks:
  devops-network:
    driver: bridge

volumes:
  devops-db-data: